<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 계정 등록 — SELL IT</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #F26419;
    --dark: #0d0d0d;
    --surface: #161616;
    --border: rgba(255,255,255,0.08);
    --text: #e8e8e8;
    --sub: rgba(255,255,255,0.4);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Noto Sans KR',sans-serif;
    background:var(--dark); color:var(--text);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
  }

  .box {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    padding:48px 40px;
    width:100%; max-width:400px;
  }

  .logo {
    font-family:'Bebas Neue',sans-serif;
    font-size:32px; color:var(--primary);
    letter-spacing:3px; text-align:center;
    margin-bottom:4px;
  }
  .admin-label {
    font-family:'Montserrat',sans-serif;
    font-size:10px; font-weight:700; letter-spacing:2px;
    text-transform:uppercase; color:var(--sub);
    text-align:center; margin-bottom:36px;
  }

  .field { margin-bottom:18px; }
  .field label {
    display:block; font-size:12px; color:var(--sub);
    margin-bottom:6px; letter-spacing:0.5px;
  }
  .field input {
    width:100%; padding:11px 14px;
    background:rgba(255,255,255,0.05);
    border:1px solid var(--border);
    border-radius:8px; color:var(--text);
    font-family:'Noto Sans KR',sans-serif; font-size:14px;
    outline:none; transition:border-color .2s;
  }
  .field input:focus { border-color:rgba(242,100,25,0.5); }

  .hint {
    font-size:11px; color:var(--sub);
    margin-top:5px;
  }

  .error {
    background:rgba(242,100,25,0.12);
    border:1px solid rgba(242,100,25,0.3);
    border-radius:8px; padding:10px 14px;
    font-size:13px; color:#f89a6a;
    margin-bottom:18px;
  }

  .role-badge {
    display:inline-block;
    background:rgba(242,100,25,0.15);
    border:1px solid rgba(242,100,25,0.3);
    border-radius:6px; padding:6px 12px;
    font-size:12px; color:var(--primary);
    margin-bottom:24px; width:100%; text-align:center;
  }

  .btn-submit {
    width:100%; padding:13px;
    background:var(--primary); color:#fff;
    border:none; border-radius:8px;
    font-family:'Montserrat',sans-serif;
    font-size:14px; font-weight:700; letter-spacing:1px;
    cursor:pointer; transition:opacity .2s;
    margin-top:8px;
  }
  .btn-submit:hover { opacity:0.88; }

  .back-link {
    text-align:center; margin-top:20px;
    font-size:13px; color:var(--sub);
  }
  .back-link a { color:var(--primary); text-decoration:none; }
  .back-link a:hover { text-decoration:underline; }
  #bgCanvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }
  .box { position:relative; z-index:1; }
</style>
<script src="/static/js/danggn-fx.js"></script>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<div class="box">
  <div class="logo">SELL IT</div>
  <div class="admin-label">Admin Register</div>

  <div class="role-badge">생성되는 계정 역할: 운영자 (operator)</div>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="post" action="/admin/register">
    {{ csrf_input(request) | safe }}
    <div class="field">
      <label for="register_key">등록 키</label>
      <input id="register_key" name="register_key" type="password" required placeholder="관리자로부터 받은 등록 키 입력">
    </div>
    <div class="field">
      <label for="username">아이디</label>
      <input id="username" name="username" type="text" autocomplete="username" required
             value="{{ username or '' }}" minlength="2" placeholder="2자 이상">
    </div>
    <div class="field">
      <label for="password">비밀번호</label>
      <input id="password" name="password" type="password" autocomplete="new-password" required
             minlength="12" placeholder="12자 이상">
    </div>
    <div class="field">
      <label for="password_confirm">비밀번호 확인</label>
      <input id="password_confirm" name="password_confirm" type="password" autocomplete="new-password" required
             placeholder="비밀번호 재입력">
    </div>
    <button type="submit" class="btn-submit">계정 생성</button>
  </form>
  <div class="back-link"><a href="/admin/login">로그인으로 돌아가기</a></div>
</div>

<script>DanggnFX.createBgCanvas(document.getElementById('bgCanvas'));</script>
</body>
</html>
