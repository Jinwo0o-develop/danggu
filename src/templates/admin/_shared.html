<style>
  .guest-mode-banner {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 9999;
    background: rgba(134, 187, 216, 0.1);
    border-bottom: 1px solid rgba(134, 187, 216, 0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 7px 20px;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.8px;
    color: #86BBD8;
  }
  .guest-mode-banner a {
    color: #F26419;
    text-decoration: none;
    border: 1px solid rgba(242,100,25,0.4);
    padding: 3px 14px;
    border-radius: 100px;
    font-size: 11px;
    transition: all 0.2s;
  }
  .guest-mode-banner a:hover {
    background: rgba(242,100,25,0.12);
  }

  .admin-fab-group {
    position: fixed;
    bottom: 28px;
    right: 28px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
    z-index: 999;
  }
  .admin-fab {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    text-decoration: none;
    cursor: pointer;
    border: none;
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,0.35);
    transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    letter-spacing: 0.3px;
  }
  .admin-fab:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.45);
  }
  .admin-fab-site {
    background: #F26419;
    color: #fff;
  }
  .admin-fab-site:hover { color: #fff; }
  .admin-fab-back {
    background: rgba(38,38,38,0.95);
    color: rgba(255,255,255,0.82);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .admin-fab-back:hover { color: #fff; }
</style>

{% if admin and admin.role == 'guest' %}
<div class="guest-mode-banner">
  👁 읽기 전용 모드 — 데이터 조회만 가능합니다
  <a href="/admin/login">로그인하기 →</a>
</div>
<script>
(function () {
  var BANNER_H = 33;
  document.body.style.paddingTop = BANNER_H + 'px';
  var topbar = document.querySelector('.topbar');
  if (topbar) topbar.style.top = BANNER_H + 'px';
})();
</script>
{% endif %}

<div class="admin-fab-group">
  <button class="admin-fab admin-fab-back" onclick="history.back()">← 뒤로가기</button>
  <a href="/danggn" class="admin-fab admin-fab-site">↗ 사이트로</a>
</div>

<script>
(function () {
  /* 마우스 휠(중간 버튼) 클릭 → 새 탭으로 열기 */
  document.addEventListener('mousedown', function (e) {
    if (e.button !== 1) return;
    var link = e.target.closest('a[href]');
    if (!link) return;
    e.preventDefault();
    window.open(link.href, '_blank', 'noopener,noreferrer');
  }, { capture: true });
}());
</script>
