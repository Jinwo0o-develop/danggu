<style>
  .admin-fab-group {
    position: fixed;
    bottom: 28px;
    right: 28px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
    z-index: 999;
  }
  .admin-fab {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    text-decoration: none;
    cursor: pointer;
    border: none;
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,0.35);
    transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    letter-spacing: 0.3px;
  }
  .admin-fab:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.45);
  }
  .admin-fab-site {
    background: #F26419;
    color: #fff;
  }
  .admin-fab-site:hover { color: #fff; }
  .admin-fab-back {
    background: rgba(38,38,38,0.95);
    color: rgba(255,255,255,0.82);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .admin-fab-back:hover { color: #fff; }
</style>

<div class="admin-fab-group">
  <button class="admin-fab admin-fab-back" onclick="history.back()">← 뒤로가기</button>
  <a href="/danggn" class="admin-fab admin-fab-site">↗ 사이트로</a>
</div>

<script>
(function () {
  /* 마우스 휠(중간 버튼) 클릭 → 새 탭으로 열기 */
  document.addEventListener('mousedown', function (e) {
    if (e.button !== 1) return;
    var link = e.target.closest('a[href]');
    if (!link) return;
    e.preventDefault();
    window.open(link.href, '_blank', 'noopener,noreferrer');
  }, { capture: true });
}());
</script>
