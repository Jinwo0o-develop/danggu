<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Give, We Sell.{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
<script src="/static/js/danggn-fx.js"></script>
<style>
  /* ══════════════════════════════════════════════════
     Design Tokens
  ══════════════════════════════════════════════════ */
  :root {
    --primary: #F26419;
    --secondary: #86BBD8;
    --dark: #1a1a1a;
    --light: #fafafa;
  }

  /* ══════════════════════════════════════════════════
     Reset
  ══════════════════════════════════════════════════ */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ══════════════════════════════════════════════════
     Root HTML — child pages override for scroll-snap
  ══════════════════════════════════════════════════ */
  {% block html_style %}{% endblock %}

  /* ══════════════════════════════════════════════════
     Base Body
  ══════════════════════════════════════════════════ */
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--dark);
    color: var(--light);
    cursor: none;
    overflow-x: hidden;
    {% block body_style %}min-height: 100vh;{% endblock %}
  }

  /* ══════════════════════════════════════════════════
     Background Canvas
  ══════════════════════════════════════════════════ */
  #bgCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* ══════════════════════════════════════════════════
     Custom Cursor
  ══════════════════════════════════════════════════ */
  .cursor {
    width: 12px; height: 12px;
    background: var(--primary);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    /* left/top은 JS lerp가 처리하므로 제외 — opacity·색상만 부드럽게 전환 */
    transition: transform 0.1s ease, opacity 0.2s ease, background-color 0.3s ease;
  }
  .cursor-follower {
    width: 36px; height: 36px;
    border: 2px solid var(--secondary);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9998;
    opacity: 0.6;
    /* all → 명시적 속성만: left/top에 CSS transition 중첩 시 추가 지연 발생 방지 */
    transition: transform 0.15s ease, opacity 0.2s ease, border-color 0.3s ease;
  }

  /* ══════════════════════════════════════════════════
     Form Elements
  ══════════════════════════════════════════════════ */
  .form-group { margin-bottom: 20px; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 8px;
    font-family: 'Montserrat', sans-serif;
  }

  input[type="text"],
  input[type="email"],
  input[type="password"],
  input[type="tel"],
  textarea {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 14px 18px;
    color: var(--light);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    cursor: none;
  }

  input[type="text"]:focus,
  input[type="email"]:focus,
  input[type="password"]:focus,
  input[type="tel"]:focus,
  textarea:focus {
    border-color: rgba(242,100,25,0.45);
    background: rgba(255,255,255,0.07);
    box-shadow: 0 0 0 3px rgba(242,100,25,0.08);
  }

  textarea { resize: vertical; }

  select {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 14px 18px;
    color: var(--light);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    outline: none;
    cursor: none;
    transition: border-color 0.2s;
  }

  select option {
    background: var(--dark);
    color: var(--light);
  }

  /* ══════════════════════════════════════════════════
     Glass Card (glassmorphism base)
  ══════════════════════════════════════════════════ */
  .glass-card {
    background: rgba(20,20,20,0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 20px;
  }

  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px;
    margin-bottom: 8px;
  }
  .card-sub {
    font-size: 14px;
    color: rgba(255,255,255,0.45);
    margin-bottom: 36px;
  }

  /* ══════════════════════════════════════════════════
     Buttons
  ══════════════════════════════════════════════════ */
  .btn, .submit-btn {
    width: 100%;
    background: var(--primary);
    color: white;
    font-family: 'Montserrat', sans-serif;
    font-size: 15px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 18px;
    border-radius: 100px;
    border: none;
    cursor: none;
    transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.1s ease;
    margin-top: 8px;
  }
  .btn:hover, .submit-btn:hover {
    background: #d9540f;
    box-shadow: 0 8px 28px rgba(242,100,25,0.35);
  }
  .btn:active, .submit-btn:active { transform: scale(0.98); }

  /* ══════════════════════════════════════════════════
     Alert Boxes
  ══════════════════════════════════════════════════ */
  .error {
    background: rgba(242,100,25,0.1);
    border: 1px solid rgba(242,100,25,0.3);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 14px;
    color: var(--primary);
    margin-bottom: 20px;
  }
  .success {
    background: rgba(72,199,142,0.1);
    border: 1px solid rgba(72,199,142,0.3);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 14px;
    color: #48C78E;
    margin-bottom: 20px;
  }

  /* ══════════════════════════════════════════════════
     Form Helpers
  ══════════════════════════════════════════════════ */
  .hint {
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    margin-top: 6px;
  }

  .footer-link {
    text-align: center;
    margin-top: 24px;
    font-size: 13px;
    color: rgba(255,255,255,0.4);
  }
  .footer-link a { color: var(--secondary); text-decoration: none; }
  .footer-link a:hover { text-decoration: underline; }

  .footer-email {
    color: rgba(242,100,25,.75);
    text-decoration: none;
    transition: color .2s;
  }
  .footer-email:hover { color: #F26419; }

  /* ══════════════════════════════════════════════════
     Status Badges (shared: profile / status / lookup)
  ══════════════════════════════════════════════════ */
  .s-badge, .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .s-dot { width: 6px; height: 6px; border-radius: 50%; }

  /* CSS-class-driven status colors (profile list) */
  .s-접수됨   { background: rgba(134,187,216,0.14); color: #86BBD8; }
  .s-수거예정 { background: rgba(255,209,102,0.14); color: #FFD166; }
  .s-판매중   { background: rgba(242,100,25,0.14);  color: #F26419; }
  .s-정산완료 { background: rgba(72,199,142,0.14);  color: #48C78E; }
  .s-취소됨   { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.35); }

  /* ══════════════════════════════════════════════════
     Page-specific styles — child pages override here
  ══════════════════════════════════════════════════ */
  {% block page_css %}{% endblock %}
</style>
</head>
<body>

{% block bg_canvas %}<canvas id="bgCanvas"></canvas>{% endblock %}
<div class="cursor" id="cursor"></div>
<div class="cursor-follower" id="follower"></div>

{% block navbar %}{% include '당근마켓/_navbar.html' %}{% endblock %}

{% block content %}{% endblock %}

<script>
  DanggnFX.initCursor();
  {% block bg_canvas_init %}
  DanggnFX.createBgCanvas(document.getElementById('bgCanvas'));
  {% endblock %}

  /* ── Shared: simple phone formatter (no prefix lock) ── */
  function fmtPhone(el) {
    const d = el.value.replace(/\D/g, '').slice(0, 11);
    if (d.length <= 3)      el.value = d;
    else if (d.length <= 7) el.value = d.slice(0,3) + '-' + d.slice(3);
    else                    el.value = d.slice(0,3) + '-' + d.slice(3,7) + '-' + d.slice(7);
  }

  {% block page_js %}{% endblock %}
</script>

</body>
</html>
