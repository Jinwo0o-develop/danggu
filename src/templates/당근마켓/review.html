<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>거래 후기 — Give, We Sell.</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
<script src="/static/js/danggn-fx.js"></script>
<style>
  :root {
    --primary: #F26419;
    --secondary: #86BBD8;
    --dark: #1a1a1a;
    --light: #fafafa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--dark);
    color: var(--light);
    min-height: 100vh;
    cursor: none;
    overflow-x: hidden;
  }

  #bgCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  .cursor {
    width: 12px; height: 12px;
    background: var(--primary);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transition: transform 0.1s ease;
  }
  .cursor-follower {
    width: 36px; height: 36px;
    border: 2px solid var(--secondary);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9998;
    transition: all 0.15s ease;
    opacity: 0.6;
  }

  /* Page */
  .review-page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    padding-top: 80px;
    padding-bottom: 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Header */
  .review-header {
    text-align: center;
    margin-bottom: 48px;
  }

  .review-badge {
    display: inline-block;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--secondary);
    text-transform: uppercase;
    border: 1px solid rgba(134,187,216,0.4);
    padding: 6px 18px;
    border-radius: 100px;
    margin-bottom: 20px;
  }

  .review-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 8vw, 88px);
    line-height: 0.95;
    color: var(--light);
  }

  .review-title span { color: var(--primary); display: block; }

  .review-sub {
    font-size: 15px;
    font-weight: 300;
    color: rgba(255,255,255,0.45);
    margin-top: 16px;
  }

  /* Card */
  .review-card {
    background: rgba(20,20,20,0.72);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 20px;
    padding: 40px 48px;
    width: 100%;
    max-width: 520px;
    position: relative;
  }

  .review-card::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(242,100,25,0.45), rgba(134,187,216,0.3), transparent);
  }

  /* Rating buttons */
  .rating-row {
    display: flex;
    gap: 14px;
    margin-bottom: 28px;
  }

  .rating-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 28px 16px;
    border-radius: 14px;
    border: 2px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03);
    cursor: none;
    transition: all 0.22s ease;
    user-select: none;
  }

  .rating-btn:hover {
    background: rgba(255,255,255,0.07);
    border-color: rgba(255,255,255,0.22);
    transform: translateY(-2px);
  }

  .rating-btn.selected-like {
    background: rgba(72,199,142,0.1);
    border-color: rgba(72,199,142,0.55);
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(72,199,142,0.12);
  }

  .rating-btn.selected-dislike {
    background: rgba(242,100,25,0.1);
    border-color: rgba(242,100,25,0.55);
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(242,100,25,0.12);
  }

  .rating-btn.dimmed {
    opacity: 0.3;
    transform: translateY(0) scale(0.97) !important;
    filter: grayscale(0.6);
    transition: all 0.3s ease;
  }

  .rating-emoji {
    font-size: 40px;
    line-height: 1;
    transition: transform 0.2s ease;
  }

  .rating-btn:hover .rating-emoji,
  .rating-btn.selected-like .rating-emoji,
  .rating-btn.selected-dislike .rating-emoji {
    transform: scale(1.15);
  }

  .rating-label {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: rgba(255,255,255,0.55);
    transition: color 0.2s ease;
  }

  .rating-btn.selected-like .rating-label   { color: rgba(72,199,142,0.9); }
  .rating-btn.selected-dislike .rating-label { color: var(--primary); }

  /* Divider */
  .form-divider {
    height: 1px;
    background: rgba(255,255,255,0.07);
    margin-bottom: 24px;
  }

  /* Comment */
  .comment-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 10px;
    font-family: 'Montserrat', sans-serif;
  }

  .optional-tag {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.2);
    text-transform: none;
    font-family: 'Noto Sans KR', sans-serif;
  }

  textarea {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 14px 18px;
    color: var(--light);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 300;
    outline: none;
    resize: vertical;
    min-height: 90px;
    transition: border-color 0.2s ease, background 0.2s ease;
    cursor: none;
  }

  textarea:focus {
    border-color: rgba(242,100,25,0.4);
    background: rgba(255,255,255,0.07);
  }

  /* Submit */
  .submit-btn {
    width: 100%;
    margin-top: 24px;
    background: var(--primary);
    color: white;
    font-family: 'Montserrat', sans-serif;
    font-size: 15px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 18px;
    border-radius: 100px;
    border: none;
    cursor: none;
    transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.1s ease;
    opacity: 0.4;
    pointer-events: none;
  }

  .submit-btn.ready {
    opacity: 1;
    pointer-events: auto;
  }

  .submit-btn.ready:hover {
    background: #d9540f;
    box-shadow: 0 8px 28px rgba(242,100,25,0.35);
  }

  .submit-btn.ready:active { transform: scale(0.98); }

  /* Like flash */
  @keyframes likeFlash {
    0%   { background: rgba(255,255,255,0.0); box-shadow: none; }
    25%  { background: rgba(255,255,255,0.88); box-shadow: 0 0 32px rgba(255,255,255,0.5); border-color: white; }
    60%  { background: rgba(72,199,142,0.18);  border-color: rgba(72,199,142,0.7); }
    100% { background: rgba(72,199,142,0.1);   border-color: rgba(72,199,142,0.55); }
  }

  .rating-btn.do-like-flash {
    animation: likeFlash 0.65s ease forwards;
  }

  /* Dislike shake + blue tint */
  @keyframes dislikeShake {
    0%,100% { transform: translateY(-2px) translateX(0); }
    15%     { transform: translateY(-2px) translateX(-5px) rotate(-2deg); }
    30%     { transform: translateY(-2px) translateX(5px)  rotate(2deg); }
    45%     { transform: translateY(-2px) translateX(-4px) rotate(-1deg); }
    60%     { transform: translateY(-2px) translateX(4px)  rotate(1deg); }
    75%     { transform: translateY(-2px) translateX(-2px); }
  }

  .rating-btn.do-dislike-shake {
    animation: dislikeShake 0.55s ease forwards;
  }

  /* floating note / tear elements */
  .fx-note, .fx-tear {
    position: fixed;
    pointer-events: none;
    z-index: 9997;
    user-select: none;
  }

  /* ── Thanks Modal ── */
  .thanks-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }

  .thanks-overlay.visible {
    opacity: 1;
    pointer-events: auto;
  }

  .thanks-card {
    background: rgba(18,18,18,0.95);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 28px;
    padding: 60px 64px;
    text-align: center;
    max-width: 420px;
    width: 90%;
    transform: scale(0.78) translateY(24px);
    transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
  }

  /* top accent line */
  .thanks-card::before {
    content: '';
    position: absolute;
    top: 0; left: 15%; right: 15%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--secondary), var(--primary), transparent);
    border-radius: 2px;
  }

  .thanks-overlay.visible .thanks-card {
    transform: scale(1) translateY(0);
  }

  .thanks-icon {
    font-size: 60px;
    margin-bottom: 20px;
    display: block;
    animation: heartBeat 0.6s ease 0.5s both;
  }

  @keyframes heartBeat {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.28); }
    70%  { transform: scale(0.95); }
    100% { transform: scale(1); }
  }

  .thanks-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 68px;
    line-height: 1;
    color: var(--light);
    margin-bottom: 10px;
    letter-spacing: 2px;
  }

  .thanks-sub {
    font-size: 15px;
    font-weight: 300;
    color: rgba(255,255,255,0.5);
    line-height: 1.7;
    margin-bottom: 40px;
  }

  .thanks-sub strong {
    color: var(--secondary);
    font-weight: 500;
  }

  .home-btn {
    display: inline-block;
    background: var(--primary);
    color: white;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 16px 44px;
    border-radius: 100px;
    text-decoration: none;
    cursor: none;
    transition: background 0.2s ease, box-shadow 0.2s ease;
  }

  .home-btn:hover {
    background: #d9540f;
    box-shadow: 0 8px 24px rgba(242,100,25,0.35);
  }

  @media (max-width: 600px) {
    .review-card { padding: 28px 20px; }
    .thanks-card { padding: 40px 24px; }
    .thanks-title { font-size: 52px; }
  }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div class="cursor" id="cursor"></div>
<div class="cursor-follower" id="follower"></div>

{% include '당근마켓/_navbar.html' %}

<!-- Thanks modal -->
<div class="thanks-overlay" id="thanksOverlay">
  <div class="thanks-card">
    <span class="thanks-icon">🧡</span>
    <div class="thanks-title">감사합니다</div>
    <p class="thanks-sub">
      소중한 후기가 등록되었습니다.<br>
      <strong>더 좋은 서비스</strong>로 보답하겠습니다.
    </p>
    <a href="/danggn" class="home-btn">홈으로 돌아가기</a>
  </div>
</div>

<main class="review-page">
  <div class="review-header">
    <div class="review-badge">Transaction Complete</div>
    <h1 class="review-title">
      거래는<br>
      <span>어떠셨나요?</span>
    </h1>
    <p class="review-sub">솔직한 한 마디가 큰 힘이 됩니다.</p>
  </div>

  <div class="review-card">
    <form method="post" action="/danggn/review" id="reviewForm">
      <input type="hidden" name="rating" id="ratingInput" value="">

      <div class="rating-row">
        <div class="rating-btn" id="btnLike" data-rating="like">
          <span class="rating-emoji">👍</span>
          <span class="rating-label">좋아요</span>
        </div>
        <div class="rating-btn" id="btnDislike" data-rating="dislike">
          <span class="rating-emoji">👎</span>
          <span class="rating-label">싫어요</span>
        </div>
      </div>

      <div class="form-divider"></div>

      <div class="comment-label">
        한 줄 후기
        <span class="optional-tag">선택 사항</span>
      </div>
      <textarea name="comment" placeholder="거래 경험을 자유롭게 남겨주세요."></textarea>

      <button type="submit" class="submit-btn" id="submitBtn">후기 등록하기 →</button>
    </form>
  </div>
</main>

<script>
  // ── 공유 이펙트 모듈 초기화 ──
  DanggnFX.initCursor();
  DanggnFX.createBgCanvas(document.getElementById('bgCanvas'));

  // ── Rating selection + animations ──
  const ratingInput = document.getElementById('ratingInput');
  const submitBtn   = document.getElementById('submitBtn');
  const btnLike     = document.getElementById('btnLike');
  const btnDislike  = document.getElementById('btnDislike');

  // ── Like: white flash → music notes fly out and return ──
  function playLike() {
    btnLike.classList.remove('do-like-flash');
    void btnLike.offsetWidth; // reflow to restart
    btnLike.classList.add('do-like-flash');

    const notes = ['🎵','🎶','♪','♫','🎵','🎶','♩'];
    const rect  = btnLike.getBoundingClientRect();
    const cx = rect.left + rect.width  / 2;
    const cy = rect.top  + rect.height / 2;

    notes.forEach((note, i) => {
      const el = document.createElement('div');
      el.className = 'fx-note';
      el.textContent = note;
      const size = 15 + Math.random() * 11;
      el.style.cssText = `
        left:${cx}px; top:${cy}px;
        font-size:${size}px;
        transform:translate(-50%,-50%);
      `;
      document.body.appendChild(el);

      const angle  = (i / notes.length) * Math.PI * 2 - Math.PI / 2;
      const dist   = 52 + Math.random() * 28;
      const tx     = Math.cos(angle) * dist;
      const ty     = Math.sin(angle) * dist;
      const r1     = (Math.random() - 0.5) * 50;
      const r2     = (Math.random() - 0.5) * 90;
      const delay  = i * 55;

      el.animate([
        { transform:'translate(-50%,-50%) scale(0) rotate(0deg)',       opacity:0,   offset:0    },
        { transform:`translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(1.2) rotate(${r1}deg)`, opacity:1, offset:0.42 },
        { transform:`translate(calc(-50% + ${tx*1.15}px), calc(-50% + ${ty*0.85}px)) scale(0.95) rotate(${r2}deg)`, opacity:0.85, offset:0.65 },
        { transform:'translate(-50%,-50%) scale(0) rotate(0deg)',       opacity:0,   offset:1    },
      ], {
        duration: 1100 + i * 60,
        delay,
        easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
      }).onfinish = () => el.remove();
    });
  }

  // ── Dislike: emoji → 😢, shake, tears fall ──
  function playDislike() {
    const emojiEl = btnDislike.querySelector('.rating-emoji');
    emojiEl.textContent = '😢';

    btnDislike.classList.remove('do-dislike-shake');
    void btnDislike.offsetWidth;
    btnDislike.classList.add('do-dislike-shake');

    const rect = btnDislike.getBoundingClientRect();

    for (let i = 0; i < 5; i++) {
      const tear = document.createElement('div');
      tear.className = 'fx-tear';
      tear.textContent = '💧';
      const startX = rect.left + rect.width * (0.25 + Math.random() * 0.5);
      const startY = rect.top  + rect.height * 0.45;
      tear.style.cssText = `
        left:${startX}px; top:${startY}px;
        font-size:${12 + Math.random() * 7}px;
        transform:translate(-50%,-50%);
      `;
      document.body.appendChild(tear);

      const fallDist = 40 + i * 14;
      tear.animate([
        { transform:'translate(-50%,-50%) scale(0)',      opacity:0   },
        { transform:'translate(-50%,-50%) scale(1)',      opacity:1,  offset:0.12 },
        { transform:`translate(${(Math.random()-0.5)*12}px, calc(-50% + ${fallDist}px)) scale(0.7)`, opacity:0 },
      ], {
        duration: 700 + i * 120,
        delay: i * 80,
        easing: 'ease-in',
      }).onfinish = () => tear.remove();
    }
  }

  btnLike.addEventListener('click', () => {
    ratingInput.value = 'like';
    btnLike.classList.add('selected-like');
    btnLike.classList.remove('dimmed');
    btnDislike.classList.remove('selected-dislike');
    btnDislike.classList.add('dimmed');
    btnDislike.querySelector('.rating-emoji').textContent = '👎';
    submitBtn.classList.add('ready');
    playLike();
  });

  btnDislike.addEventListener('click', () => {
    ratingInput.value = 'dislike';
    btnDislike.classList.add('selected-dislike');
    btnDislike.classList.remove('dimmed');
    btnLike.classList.remove('selected-like');
    btnLike.classList.add('dimmed');
    submitBtn.classList.add('ready');
    playDislike();
  });

  // ── Thanks modal ──
  {% if success %}
  window.addEventListener('load', () => {
    setTimeout(() => {
      document.getElementById('thanksOverlay').classList.add('visible');
    }, 120);
  });
  {% endif %}
</script>
</body>
</html>
