<style>
  /* ── NAVBAR ── */
  .navbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    height: 52px;
    background: rgba(20, 20, 20, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  }

  .navbar-logo {
    display: flex;
    align-items: center;
    height: 32px;
  }

  .navbar-logo img {
    height: 32px;
    width: auto;
    object-fit: contain;
  }

  .navbar-divider {
    width: 1px;
    height: 24px;
    background: rgba(255, 255, 255, 0.15);
    margin: 0 32px;
  }

  .navbar-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    list-style: none;
    margin-left: auto;
  }

  .navbar-nav > li { position: relative; }

  .navbar-nav a {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.65);
    text-decoration: none;
    padding: 6px 14px;
    border-radius: 6px;
    transition: all 0.2s ease;
    letter-spacing: 0.3px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .navbar-nav a:hover {
    color: #fafafa;
    background: rgba(255, 255, 255, 0.07);
  }

  /* Dropdown arrow */
  .dropdown-arrow {
    font-size: 9px;
    opacity: 0.6;
    transition: transform 0.22s ease;
    display: inline-block;
  }

  /* ── Dropdown panel ──
     투명 브리지(::after)로 트리거↔패널 사이 갭을 메워
     마우스를 천천히 움직여도 hover가 끊기지 않음.
     실제 열기/닫기는 JS가 딜레이를 적용하여 제어. */
  .nav-dropdown {
    position: absolute;
    top: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%) translateY(-6px);
    background: rgba(18, 18, 18, 0.97);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 6px;
    min-width: 152px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s ease, transform 0.18s ease;
    box-shadow: 0 16px 40px rgba(0,0,0,0.5);
  }

  /* 투명 브리지: 트리거와 패널 사이 8px 갭을 채워 마우스 이탈 방지 */
  .nav-dropdown::after {
    content: '';
    position: absolute;
    bottom: 100%;
    left: 0; right: 0;
    height: 12px; /* gap(8px) + 여유 4px */
  }

  /* triangle notch */
  .nav-dropdown::before {
    content: '';
    position: absolute;
    top: -6px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-bottom: 6px solid rgba(255, 255, 255, 0.1);
  }

  /* JS가 제어하므로 CSS :hover 규칙 제거 */

  .nav-dropdown a {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 14px;
    border-radius: 8px;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.6);
    white-space: nowrap;
    background: transparent;
  }

  .nav-dropdown a:hover {
    background: rgba(255, 255, 255, 0.08);
    color: #fafafa;
  }

  .nav-dropdown a .dd-icon {
    font-size: 14px;
    flex-shrink: 0;
  }

  .navbar-cta {
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    color: white !important;
    background: #F26419 !important;
    padding: 8px 20px !important;
    border-radius: 100px !important;
  }

  .navbar-cta:hover {
    background: #d9540f !important;
    color: white !important;
  }

  @media (max-width: 768px) {
    .navbar { padding: 0 20px; }
    .navbar-nav { display: none; }
    .navbar-divider { display: none; }
  }

</style>


<nav class="navbar">
  <a href="{{ logo_href | default('#intro') }}" class="navbar-logo">
    <img src="/static/images/logo.png" alt="SELL IT 로고">
  </a>
  <div class="navbar-divider"></div>
  <ul class="navbar-nav">
    <li><a href="#how">서비스 소개</a></li>
    <li class="has-dropdown">
      <a href="#reviews">이용 후기 <span class="dropdown-arrow">▾</span></a>
      <div class="nav-dropdown">
        <a href="/danggn/review"><span class="dd-icon">✏️</span>이용후기 작성</a>
        <a href="/danggn/reviews"><span class="dd-icon">📋</span>이용후기 목록</a>
      </div>
    </li>
    <li><a href="#faq">FAQ</a></li>
    {% if request.session.get('user_id') %}
    <li class="has-dropdown">
      <a href="/customer/profile">내 계정 <span class="dropdown-arrow">▾</span></a>
      <div class="nav-dropdown">
        <a href="/customer/profile"><span class="dd-icon">👤</span>프로필</a>
        <form method="post" action="/customer/logout" style="margin:0;">
          <button type="submit" style="width:100%; display:flex; align-items:center; gap:8px; padding:9px 14px; border-radius:8px; font-size:13px; color:rgba(255,255,255,.6); background:transparent; border:none; cursor:pointer; font-family:'Noto Sans KR',sans-serif; white-space:nowrap;">
            <span class="dd-icon">🚪</span>로그아웃
          </button>
        </form>
      </div>
    </li>
    {% else %}
    <li>
      <a href="/customer/login" id="navLoginBtn"
         onclick="if(typeof openAuthModal!=='undefined'){openAuthModal('login');return false;}">로그인</a>
    </li>
    {% endif %}
    <li><a href="/danggn/apply" class="navbar-cta">신청하기</a></li>
  </ul>
</nav>

<script>
(function () {
  /* ── 드롭다운: JS 딜레이로 천천히 이동해도 닫히지 않음 ── */
  document.querySelectorAll('.has-dropdown').forEach(function (li) {
    var dd    = li.querySelector('.nav-dropdown');
    var arrow = li.querySelector('.dropdown-arrow');
    var timer;

    function openDd() {
      clearTimeout(timer);
      Object.assign(dd.style, {
        opacity: '1',
        pointerEvents: 'auto',
        transform: 'translateX(-50%) translateY(0)'
      });
      if (arrow) arrow.style.transform = 'rotate(180deg)';
    }

    function closeDd() {
      timer = setTimeout(function () {
        Object.assign(dd.style, {
          opacity: '0',
          pointerEvents: 'none',
          transform: 'translateX(-50%) translateY(-6px)'
        });
        if (arrow) arrow.style.transform = '';
      }, 260); // 260ms 유예 — 천천히 이동해도 닫히지 않음
    }

    li.addEventListener('mouseenter', openDd);
    li.addEventListener('mouseleave', closeDd);
    // 패널 위에 올라가면 타이머 취소
    dd.addEventListener('mouseenter', function () { clearTimeout(timer); });
    dd.addEventListener('mouseleave', closeDd);
  });

  /* ── 마우스 휠(중간 버튼) 클릭 → 새 탭으로 열기 ── */
  document.addEventListener('mousedown', function (e) {
    if (e.button !== 1) return;
    var link = e.target.closest('a[href]');
    if (!link) return;
    e.preventDefault();
    window.open(link.href, '_blank', 'noopener,noreferrer');
  }, { capture: true });
}());
</script>
