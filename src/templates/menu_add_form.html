<div class="panel-box">
    <h3 class="panel-title">메뉴 추가</h3>
    <form
        hx-post="/api/menus"
        hx-target="#toast"
        hx-swap="innerHTML"
        hx-on::after-request="this.reset(); document.getElementById('panel').innerHTML=''">
        <div class="form-row">
            <label>이모지</label>
            <input type="text" name="emoji" placeholder="🍜" required maxlength="4">
        </div>
        <div class="form-row">
            <label>메뉴 이름</label>
            <input type="text" name="name" placeholder="짜장면" required>
        </div>
        <div class="form-row">
            <label>설명</label>
            <input type="text" name="desc" placeholder="한 줄 설명" required>
        </div>
        <div class="form-actions">
            <button type="submit" class="action-btn add-btn">추가하기</button>
            <button type="button" class="action-btn cancel-btn"
                onclick="document.getElementById('panel').innerHTML=''">취소</button>
        </div>
    </form>
</div>
